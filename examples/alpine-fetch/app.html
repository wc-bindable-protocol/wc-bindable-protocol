<!-- Setup -->
<script type="module">
  import Alpine from "alpinejs";
  import wcBindable from "@wc-bindable/alpine";
  import "./my-fetch.js";

  Alpine.plugin(wcBindable);
  Alpine.start();
</script>

<!-- Usage: x-wc-bindable binds fetch state directly into x-data -->
<div x-data="{
  url: 'https://jsonplaceholder.typicode.com/posts/1',
  value: null, loading: false, error: null, status: null,
  handleFetch() {
    this.$refs.fetcher.url = this.url;
    this.$refs.fetcher.fetch();
  },
  handleAbort() { this.$refs.fetcher.abort(); }
}">
  <my-fetch x-ref="fetcher" x-wc-bindable manual></my-fetch>

  <input type="text" x-model="url" />
  <button @click="handleFetch()" :disabled="loading">Fetch</button>
  <button @click="handleAbort()">Abort</button>

  <span x-text="'loading: ' + loading"></span>
  <span x-text="'status: ' + (status ?? '—')"></span>
  <pre x-text="value ? JSON.stringify(value, null, 2) : 'No response yet'"></pre>
</div>
