<svg width="100%" viewBox="0 0 780 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .label-main { font-size: 14px; font-weight: 500; }
  .label-sub  { font-size: 12px; font-weight: 400; }
  .label-anno { font-size: 11px; font-weight: 400; }
</style>

<!-- ======== Shell (HTMLElement) - outer boundary ======== -->
<rect x="40" y="30" width="600" height="260" rx="16"
      fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="340" y="50" text-anchor="middle" class="label-main" fill="#444441">
  Shell (HTMLElement)
</text>

<!-- ======== Core (EventTarget) - inner boundary ======== -->
<rect x="55" y="60" width="570" height="110" rx="12"
      fill="#e8e6df" stroke="#8a887f" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="340" y="78" text-anchor="middle" class="label-sub" fill="#5f5e5a">
  Core (EventTarget)
</text>

<!-- Async logic -->
<rect x="70" y="88" width="160" height="52" rx="8"
      fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="150" y="108" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#712b13">Async logic</text>
<text x="150" y="126" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#993c1d">fetch, WS, timer</text>

<!-- Internal state -->
<rect x="252" y="88" width="150" height="52" rx="8"
      fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="327" y="108" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#3c3489">Internal state</text>
<text x="327" y="126" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#534ab7">value, loading, error</text>

<!-- static wcBindable -->
<rect x="424" y="88" width="180" height="52" rx="8"
      fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="514" y="108" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#085041">static wcBindable</text>
<text x="514" y="126" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#0f6e56">Protocol declaration</text>

<!-- Arrows within Core -->
<line x1="230" y1="114" x2="250" y2="114" marker-end="url(#arrow)" stroke="#73726c" stroke-width="1.5"/>
<line x1="402" y1="114" x2="422" y2="114" marker-end="url(#arrow)" stroke="#73726c" stroke-width="1.5"/>

<!-- -- Shell-specific area (below Core, inside Shell) -- -->

<!-- Attributes + Lifecycle -->
<rect x="70" y="185" width="140" height="40" rx="8"
      fill="#faf0e2" stroke="#854f0b" stroke-width="0.5"/>
<text x="140" y="205" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#633806">Attributes</text>

<rect x="228" y="185" width="140" height="40" rx="8"
      fill="#faf0e2" stroke="#854f0b" stroke-width="0.5"/>
<text x="298" y="205" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#633806">Lifecycle</text>

<!-- CustomEvent dispatch (via target injection) -->
<rect x="386" y="185" width="240" height="40" rx="8"
      fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="506" y="205" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#3c3489">CustomEvent dispatch</text>

<!-- Arrow from Internal state down to CustomEvent dispatch -->
<line x1="327" y1="140" x2="327" y2="172" stroke="#73726c" stroke-width="1"/>
<line x1="327" y1="172" x2="506" y2="172" stroke="#73726c" stroke-width="1"/>
<line x1="506" y1="172" x2="506" y2="183" marker-end="url(#arrow)" stroke="#73726c" stroke-width="1"/>

<!-- target injection label -->
<text x="340" y="248" text-anchor="middle" class="label-anno" fill="#5f5e5a">
  target injection: Core dispatches events directly on Shell
</text>

<!-- -- Side annotations: boundary crossing -- -->
<text x="660" y="120" class="label-anno" fill="#993c1d">
  &lt;- crosses
</text>
<text x="660" y="133" class="label-anno" fill="#993c1d">
     runtime boundary
</text>

<text x="660" y="202" class="label-anno" fill="#854f0b">
  &lt;- crosses
</text>
<text x="660" y="215" class="label-anno" fill="#854f0b">
     framework boundary
</text>

<!-- ======== Protocol boundary ======== -->
<text x="340" y="316" text-anchor="middle" class="label-sub" fill="#3d3d3a">
  wc-bindable-protocol boundary
</text>
<line x1="60" y1="326" x2="620" y2="326" stroke="#73726c" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>

<!-- ======== Framework adapters ======== -->
<rect x="60" y="345" width="130" height="56" rx="8"
      fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="125" y="365" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#085041">React</text>
<text x="125" y="383" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#0f6e56">useWcBindable</text>

<rect x="210" y="345" width="130" height="56" rx="8"
      fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="275" y="365" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#085041">Vue</text>
<text x="275" y="383" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#0f6e56">useWcBindable</text>

<rect x="360" y="345" width="130" height="56" rx="8"
      fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="425" y="365" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#085041">Svelte</text>
<text x="425" y="383" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#0f6e56">use:wcBindable</text>

<rect x="510" y="345" width="130" height="56" rx="8"
      fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="575" y="365" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#085041">Solid</text>
<text x="575" y="383" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#0f6e56">createWcBindable</text>

<!-- Arrows from CustomEvent dispatch to adapters -->
<line x1="430" y1="225" x2="125" y2="343" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="470" y1="225" x2="275" y2="343" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="530" y1="225" x2="425" y2="343" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="570" y1="225" x2="575" y2="343" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Thin adapter label -->
<text x="340" y="430" text-anchor="middle" class="label-sub" fill="#3d3d3a">
  Thin adapters (subscribe only)
</text>

<!-- ======== Framework rendering layer ======== -->
<line x1="60" y1="445" x2="620" y2="445" stroke="#73726c" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>

<rect x="140" y="460" width="400" height="56" rx="12"
      fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text x="340" y="480" text-anchor="middle" dominant-baseline="central"
      class="label-main" fill="#633806">Framework = rendering machine</text>
<text x="340" y="498" text-anchor="middle" dominant-baseline="central"
      class="label-sub" fill="#854f0b">No async logic, just state -&gt; UI</text>

<!-- Arrows from adapters to framework -->
<line x1="125" y1="401" x2="200" y2="458" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="275" y1="401" x2="290" y2="458" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="425" y1="401" x2="390" y2="458" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="575" y1="401" x2="480" y2="458" stroke="#3d3d3a" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Bottom annotation -->
<text x="340" y="548" text-anchor="middle" class="label-sub" fill="#3d3d3a">
  Core (EventTarget) crosses runtime boundary - Shell (HTMLElement) crosses framework boundary
</text>
</svg>